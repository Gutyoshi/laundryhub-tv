name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify keystore exists
        run: |
          if [ ! -f keystore.jks ]; then
            echo "ERROR: keystore.jks missing - persistent signing requires committed keystore"
            exit 1
          fi
          echo "Keystore present - persistent signature will be used"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk laundryhub.apk

      - name: Upload Debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: laundryhub-tv-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: laundryhub-tv-release
          path: app/build/outputs/apk/release/*.apk

      - name: Delete existing 'latest' release
        continue-on-error: true
        run: |
          gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create 'latest' release
        run: |
          gh release create latest laundryhub.apk \
            --title "LaundryHub TV - Latest Build" \
            --notes "APK mais recente. Instalar via Downloader usando a URL encurtada." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
